{% extends 'mobile/_layout.html' %}
{% block page_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/mobile/chat.css') }}?v={{ app_version }}">
{% endblock %}
{% block topbar_left %}
  <div class="m-search-bar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="m-chat-search" type="search" placeholder="차량번호·모델·메시지 검색">
  </div>
{% endblock %}
{% block topbar_right %}
  <button class="m-icon-btn" id="m-chat-filter-btn" type="button" aria-label="필터">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 5H3"/><path d="M12 19H3"/><path d="M14 3v4"/><path d="M16 17v4"/><path d="M21 12h-9"/><path d="M21 19h-5"/><path d="M21 5h-7"/><path d="M8 10v4"/><path d="M8 12H3"/></svg>
  </button>
{% endblock %}
{% block body %}
<div class="m-list" id="m-chat-list">
  <!-- JS 렌더 -->
</div>
{% endblock %}
{% block page_js %}
<script type="module" src="{{ url_for('static', filename='js/mobile/chat.js') }}?v={{ app_version }}"></script>
{% endblock %}
