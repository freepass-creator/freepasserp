{% extends 'mobile/_layout.html' %}
{% block page_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/mobile/product-detail.css') }}?v={{ app_version }}">
{% endblock %}
{% block topbar_left %}
  <button class="m-icon-btn" id="m-back-btn" type="button" aria-label="뒤로">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
  </button>
  <div class="m-page-title" id="m-pd-title">-</div>
{% endblock %}
{% block topbar_right %}
  <button class="m-icon-btn" id="m-pd-chat-top" type="button" aria-label="문의">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
  </button>
  <button class="m-icon-btn" id="m-pd-contract" type="button" aria-label="계약">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="m9 15 2 2 4-4"/></svg>
  </button>
  <button class="m-icon-btn" id="m-pd-share" type="button" aria-label="공유">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>
  </button>
{% endblock %}
{% block body %}
<div class="m-pd" id="m-pd-content">
  <!-- JS 렌더 -->
</div>
{% endblock %}
{% block page_js %}
<script type="module" src="{{ url_for('static', filename='js/mobile/product-detail.js') }}?v={{ app_version }}"></script>
{% endblock %}
