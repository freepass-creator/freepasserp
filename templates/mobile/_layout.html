<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1b2a4a">
  <title>{{ page_title }} — FREEPASS</title>
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/icon.svg') }}">

  <!-- ⚡ 성능: DNS prefetch + preconnect (Firebase, CDN) -->
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://freepasserp3-default-rtdb.firebaseio.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">

  <!-- ⚡ 성능: 폰트는 비차단 로드 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"></noscript>

  <!-- ⚡ Critical CSS 인라인 — 첫 페인트 0 round-trip -->
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%;background:#f4f5f7;color:#0f172a;font-family:Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
    .m-body{display:flex;flex-direction:column;height:100dvh;overflow:hidden;background:#f4f5f7}
    .m-topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;height:48px;min-height:48px;padding:0 16px;background:#fff;border-bottom:1px solid #f2f4f6;flex-shrink:0;gap:12px}
    .m-topbar__left,.m-topbar__center,.m-topbar__right{display:flex;align-items:center;min-width:0}
    .m-topbar__left:empty,.m-topbar__center:empty,.m-topbar__right:empty{display:none}
    .m-page{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#fff;padding-bottom:calc(56px + env(safe-area-inset-bottom));contain:layout style}
    .m-tabbar{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;align-items:stretch;justify-content:space-around;height:calc(56px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:#fff;border-top:1px solid #f2f4f6}
    .m-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;flex:1;border:none;background:transparent;text-decoration:none;color:#8b95a1;font-size:11px;font-weight:500;padding:6px 0 0;position:relative}
    .m-tab.is-active{color:#1b2a4a;font-weight:600}
    .m-tab svg{width:22px;height:22px;stroke-width:1.5}
    .m-tab.is-active svg{stroke-width:2}
    .m-tab__badge{position:absolute;top:6px;right:50%;transform:translateX(12px);width:7px;height:7px;padding:0;border-radius:50%;background:#ef4444;color:transparent;font-size:0}
    .m-tab__badge[hidden]{display:none}
    .m-skeleton{background:linear-gradient(90deg,#f1f5f9 25%,#e9eef5 50%,#f1f5f9 75%);background-size:400% 100%;animation:m-shimmer 1.4s ease infinite;border-radius:8px}
    @keyframes m-shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile/app.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ui_toast.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/shared/fullscreen-photo-viewer.css') }}?v={{ app_version }}" media="print" onload="this.media='all'">

  <!-- ⚡ 성능: Firebase SDK preload (HTML 파싱 중에 다운로드 시작) -->
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js">
  <link rel="modulepreload" href="{{ url_for('static', filename='js/firebase/firebase-config.js') }}?v={{ app_version }}">
  <link rel="modulepreload" href="{{ url_for('static', filename='js/firebase/firebase-db.js') }}?v={{ app_version }}">
  <link rel="modulepreload" href="{{ url_for('static', filename='js/firebase/firebase-auth.js') }}?v={{ app_version }}">

  {% block page_css %}{% endblock %}
</head>
<body class="m-body" data-page="{{ page_title }}">
  <!-- 상단바 -->
  <header class="m-topbar">
    <div class="m-topbar__left">{% block topbar_left %}{% endblock %}</div>
    <div class="m-topbar__center">{% block topbar_center %}{% endblock %}</div>
    <div class="m-topbar__right">{% block topbar_right %}{% endblock %}</div>
  </header>

  <!-- 작업영역 -->
  <main class="m-page">
    {% block body %}{% endblock %}
  </main>

  <!-- 하단 탭바 (아이콘은 사이드바와 동일 - role-menu.js ICON_PATHS) -->
  <nav class="m-tabbar" id="m-tabbar">
    <a class="m-tab" href="/m/product-list" data-tab="product">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21 8-2 2-1.5-3.7A2 2 0 0 0 15.646 5H8.4a2 2 0 0 0-1.903 1.257L5 10 3 8"/><path d="M7 14h.01"/><path d="M17 14h.01"/><rect width="18" height="8" x="3" y="10" rx="2"/><path d="M5 18v2"/><path d="M19 18v2"/></svg>
      <span>상품</span>
    </a>
    <a class="m-tab" href="/m/chat" data-tab="chat">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/></svg>
      <span>대화</span>
      <span class="m-tab__badge" id="m-tab-chat-badge" hidden>0</span>
    </a>
    <a class="m-tab" href="/m/contract" data-tab="contract">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1"/><path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-.5"/><path d="M16 4h2a2 2 0 0 1 1.73 1"/><path d="M8 18h1"/><path d="M21.378 12.626a1 1 0 0 0-3.004-3.004l-4.01 4.012a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506z"/></svg>
      <span>계약</span>
      <span class="m-tab__badge" id="m-tab-contract-badge" hidden>0</span>
    </a>
    <a class="m-tab" href="/m/settings" data-tab="settings">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></svg>
      <span>설정</span>
    </a>
  </nav>

  <script>
    // 활성 탭
    (function(){
      const path = location.pathname;
      if (path.startsWith('/m/product-list')) document.querySelectorAll('.m-tab').forEach(t => t.classList.toggle('is-active', t.dataset.tab === 'product'));
      else if (path.startsWith('/m/chat')) document.querySelectorAll('.m-tab').forEach(t => t.classList.toggle('is-active', t.dataset.tab === 'chat'));
      else if (path.startsWith('/m/contract')) document.querySelectorAll('.m-tab').forEach(t => t.classList.toggle('is-active', t.dataset.tab === 'contract'));
      else if (path.startsWith('/m/settings')) document.querySelectorAll('.m-tab').forEach(t => t.classList.toggle('is-active', t.dataset.tab === 'settings'));
    })();
    // ⚡ 탭 hover/touchstart 시 prefetch (실제 클릭 전에 미리 다운로드)
    document.querySelectorAll('.m-tab[href]').forEach(tab => {
      let prefetched = false;
      const prefetch = () => {
        if (prefetched) return;
        prefetched = true;
        const link = document.createElement('link');
        link.rel = 'prefetch';
        link.href = tab.href;
        document.head.appendChild(link);
      };
      tab.addEventListener('touchstart', prefetch, { passive: true });
      tab.addEventListener('mouseenter', prefetch);
    });
  </script>
  <!-- ⚡ 모든 페이지에서 글로벌 데이터 prefetcher 실행 -->
  <script type="module" src="{{ url_for('static', filename='js/mobile/prefetch.js') }}?v={{ app_version }}"></script>
  <script type="module" src="{{ url_for('static', filename='js/mobile/tab-badges.js') }}?v={{ app_version }}"></script>
  {% block page_js %}{% endblock %}
</body>
</html>
