<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="theme-color" content="#1b2a4a">
  <title>{{ page_title }} — FREEPASS ERP</title>
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/icon.svg') }}">

  <!-- ⚡ 성능: DNS prefetch + preconnect (Firebase, CDN) -->
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://freepasserp3-default-rtdb.firebaseio.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">

  <!-- ⚡ 성능: 폰트는 비차단 로드 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"></noscript>

  <!-- ⚡ Critical CSS 인라인 — 첫 페인트 0 round-trip -->
  <style>
    *,*::before,*::after{box-sizing:border-box}
    /* ⚡ 드래그/스와이프/풀투리프레시 차단 — 진짜 앱처럼 */
    html,body{
      margin:0;padding:0;height:100%;background:#f4f5f7;color:#0f172a;
      font-family:Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
      -webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;
      -webkit-user-select:none;user-select:none;
      -webkit-touch-callout:none;
      overscroll-behavior:none;
      touch-action:pan-y;
      overflow:hidden;
    }
    /* 입력 가능한 요소만 텍스트 선택 허용 */
    input,textarea,[contenteditable=true],.m-cr__msg-bubble,.m-pd__row-value{
      -webkit-user-select:text;user-select:text;-webkit-touch-callout:default;
    }
    /* 이미지 드래그 차단 */
    img{-webkit-user-drag:none;-khtml-user-drag:none;-moz-user-drag:none;-o-user-drag:none;user-drag:none;pointer-events:auto}
    .m-body{display:flex;flex-direction:column;height:100dvh;overflow:hidden;background:#f4f5f7}
    .m-topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;height:48px;min-height:48px;padding:0 16px;background:#fff;border-bottom:1px solid #f2f4f6;flex-shrink:0;gap:12px}
    .m-topbar__left,.m-topbar__center,.m-topbar__right{display:flex;align-items:center;min-width:0}
    .m-topbar__left:empty,.m-topbar__center:empty,.m-topbar__right:empty{display:none}
    .m-topbar__title{display:flex;align-items:center;gap:6px;font-size:0.9375rem;font-weight:700;color:#0f172a}
    .m-topbar__title svg{flex-shrink:0}
    .m-page-title{margin-left:4px;min-width:0;flex:1 1 auto;font-size:0.875rem;font-weight:600;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .m-pwa-install{position:fixed;left:8px;right:8px;bottom:calc(56px + env(safe-area-inset-bottom) + 8px);z-index:300;background:#fff;border:1px solid #e2e8f0;border-radius:14px;box-shadow:0 8px 24px rgba(15,23,42,.12);padding:14px 16px}
    .m-pwa-install__inner{display:flex;flex-direction:column;gap:10px}
    .m-pwa-install__text strong{display:block;font-size:14px;font-weight:700;color:#0f172a}
    .m-pwa-install__text span{display:block;font-size:12px;color:#64748b;margin-top:2px}
    .m-pwa-install__check{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#64748b;width:auto;-webkit-tap-highlight-color:transparent;outline:none!important;border:none!important;background:transparent!important}
    .m-pwa-install__check:focus,.m-pwa-install__check:focus-visible,.m-pwa-install__check:active{outline:none!important;box-shadow:none!important}
    .m-pwa-install__check input[type=checkbox]{margin:0;width:14px;height:14px;-webkit-tap-highlight-color:transparent;outline:none!important;border:none;box-shadow:none!important}
    .m-pwa-install__check input[type=checkbox]:focus,.m-pwa-install__check input[type=checkbox]:focus-visible,.m-pwa-install__check input[type=checkbox]:active{outline:none!important;box-shadow:none!important}
    .m-pwa-install__actions{display:flex;gap:8px;justify-content:flex-end}
    .m-pwa-install__btn{border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer}
    .m-pwa-install__btn--dismiss{background:#f1f5f9;color:#64748b}
    .m-pwa-install__btn--accept{background:#1b2a4a;color:#fff}
    .m-page{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#fff;padding-bottom:calc(56px + env(safe-area-inset-bottom));contain:layout style}
    .m-tabbar{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;align-items:stretch;justify-content:space-around;height:calc(56px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:#fff;border-top:1px solid #f2f4f6}
    .m-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;flex:1;border:none;background:transparent;text-decoration:none;color:#8b95a1;font-size:11px;font-weight:500;padding:6px 0 0;position:relative}
    .m-tab.is-active{color:#1b2a4a;font-weight:600}
    .m-tab svg{width:22px;height:22px;stroke-width:1.5}
    .m-tab.is-active svg{stroke-width:2}
    .m-tab__badge{position:absolute;top:6px;right:50%;transform:translateX(12px);width:7px;height:7px;padding:0;border-radius:50%;background:#ef4444;color:transparent;font-size:0}
    .m-tab__badge[hidden]{display:none}
    .m-skeleton{background:linear-gradient(90deg,#f1f5f9 25%,#e9eef5 50%,#f1f5f9 75%);background-size:400% 100%;animation:m-shimmer 1.4s ease infinite;border-radius:8px}
    @keyframes m-shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
    /* 모달/토스트 변수 fallback (base.css 미로드 환경) */
    .fp-modal-box{width:min(320px,calc(100vw - 40px))!important;padding:24px 20px!important;border-radius:14px!important;background:#fff!important;box-shadow:0 12px 40px rgba(0,0,0,.2)!important;display:flex!important;flex-direction:column!important;align-items:center!important;gap:14px!important}
    .fp-modal-icon-wrap{display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%}
    .fp-modal-text{font-size:15px;line-height:1.5;color:#0f172a;text-align:center;white-space:pre-line;word-break:keep-all;font-weight:500}
    .fp-modal-actions{display:flex;gap:8px;width:100%;margin-top:4px}
    .fp-modal-btn{flex:1;height:46px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
    .fp-modal-btn--cancel{background:#f1f3f4;color:#5f6368}
    .fp-modal-btn--ok{background:#1b2a4a;color:#fff}
    .fp-modal-box[data-tone=success] .fp-modal-icon-wrap{background:#f0fdf4;color:#16a34a}
    .fp-modal-box[data-tone=error] .fp-modal-icon-wrap{background:#fef2f2;color:#dc2626}
    .fp-modal-box[data-tone=info] .fp-modal-icon-wrap{background:#f0f4f9;color:#1b2a4a}
    .fp-modal-box[data-tone=progress] .fp-modal-icon-wrap{background:#f0f4f9;color:#1b2a4a}
    /* 버튼 타격감 — 모든 버튼/링크 active 시 즉각 시각 피드백 */
    button,a,[role=button],.m-tab,.m-icon-btn,.m-list-row,.m-product-card{transition:transform .08s ease-out,opacity .08s ease-out,background-color .12s ease-out}
    button:active,a:active,[role=button]:active,.m-icon-btn:active{transform:scale(.94);opacity:.85}
    .m-tab:active{transform:scale(.92);opacity:.7}
    .m-list-row:active,.m-product-card:active{transform:scale(.985);background-color:#f8fafc}
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile/app.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ui_toast.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/shared/fullscreen-photo-viewer.css') }}?v={{ app_version }}" media="print" onload="this.media='all'">

  <!-- ⚡ 성능: Firebase SDK preload (HTML 파싱 중에 다운로드 시작) -->
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js">
  <link rel="modulepreload" href="{{ url_for('static', filename='js/firebase/firebase-config.js') }}?v={{ app_version }}">
  <link rel="modulepreload" href="{{ url_for('static', filename='js/firebase/firebase-db.js') }}?v={{ app_version }}">
  <link rel="modulepreload" href="{{ url_for('static', filename='js/firebase/firebase-auth.js') }}?v={{ app_version }}">

  {% block page_css %}{% endblock %}
</head>
<body class="m-body" data-page="{{ page_title }}">
  <!-- 상단바 -->
  <header class="m-topbar">
    <div class="m-topbar__left">{% block topbar_left %}{% endblock %}</div>
    <div class="m-topbar__center">{% block topbar_center %}{% endblock %}</div>
    <div class="m-topbar__right">{% block topbar_right %}{% endblock %}</div>
  </header>

  <!-- 작업영역 -->
  <main class="m-page">
    {% block body %}{% endblock %}
  </main>

  <!-- PWA 설치 배너 -->
  <div class="m-pwa-install" id="m-pwa-install" hidden>
    <div class="m-pwa-install__inner">
      <div class="m-pwa-install__text">
        <strong>FREEPASS ERP 앱 설치</strong>
        <span>설치하고 더 빠르게 사용해보세요</span>
      </div>
      <label class="m-pwa-install__check">
        <input type="checkbox" id="m-pwa-install-7d"> 7일간 묻지 않기
      </label>
      <div class="m-pwa-install__actions">
        <button type="button" class="m-pwa-install__btn m-pwa-install__btn--dismiss" id="m-pwa-install-close">닫기</button>
        <button type="button" class="m-pwa-install__btn m-pwa-install__btn--accept" id="m-pwa-install-ok">설치</button>
      </div>
    </div>
  </div>

  <!-- 하단 탭바 (아이콘은 사이드바와 동일 - role-menu.js ICON_PATHS) -->
  <nav class="m-tabbar" id="m-tabbar">
    <a class="m-tab" href="/m/product-list" data-tab="product">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21 8-2 2-1.5-3.7A2 2 0 0 0 15.646 5H8.4a2 2 0 0 0-1.903 1.257L5 10 3 8"/><path d="M7 14h.01"/><path d="M17 14h.01"/><rect width="18" height="8" x="3" y="10" rx="2"/><path d="M5 18v2"/><path d="M19 18v2"/></svg>
      <span>상품</span>
    </a>
    <a class="m-tab" href="/m/chat" data-tab="chat">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/></svg>
      <span>대화</span>
      <span class="m-tab__badge" id="m-tab-chat-badge" hidden>0</span>
    </a>
    <a class="m-tab" href="/m/contract" data-tab="contract">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1"/><path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-.5"/><path d="M16 4h2a2 2 0 0 1 1.73 1"/><path d="M8 18h1"/><path d="M21.378 12.626a1 1 0 0 0-3.004-3.004l-4.01 4.012a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506z"/></svg>
      <span>계약</span>
      <span class="m-tab__badge" id="m-tab-contract-badge" hidden>0</span>
    </a>
    <a class="m-tab" href="/m/settings" data-tab="settings">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></svg>
      <span>설정</span>
    </a>
  </nav>

  <script>
    // ⚡ PWA 설치 배너 — beforeinstallprompt 이벤트 처리
    (function(){
      var deferredPrompt = null;
      var DISMISS_KEY = 'fp_pwa_install_dismiss_until';
      // 이미 설치된 PWA에선 표시 안 함
      if (window.matchMedia('(display-mode: standalone)').matches) return;
      // 7일 dismiss 체크
      var dismissUntil = parseInt(localStorage.getItem(DISMISS_KEY) || '0', 10);
      var dismissed = Date.now() < dismissUntil;

      window.addEventListener('beforeinstallprompt', function(e){
        e.preventDefault();
        deferredPrompt = e;
        window.__fpInstallPrompt = e;
        if (!dismissed) {
          var banner = document.getElementById('m-pwa-install');
          if (banner) banner.hidden = false;
        }
      });

      function closeBanner(){
        var banner = document.getElementById('m-pwa-install');
        if (banner) banner.hidden = true;
        var chk = document.getElementById('m-pwa-install-7d');
        if (chk && chk.checked) {
          localStorage.setItem(DISMISS_KEY, String(Date.now() + 7*24*60*60*1000));
        }
      }
      document.addEventListener('click', function(e){
        if (e.target.closest('#m-pwa-install-close')) { closeBanner(); }
        else if (e.target.closest('#m-pwa-install-ok')) {
          if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.finally(function(){ deferredPrompt = null; window.__fpInstallPrompt = null; closeBanner(); });
          } else {
            closeBanner();
          }
        }
      });
    })();
  </script>
  <script>
    // ⚡ Service Worker 등록 + 새 버전 감지 시 자동 reload
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js', { scope: '/' }).then(reg => {
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'activated' && navigator.serviceWorker.controller) {
              // 새 SW 활성화됨 → 페이지 자동 새로고침
              window.location.reload();
            }
          });
        });
      }).catch(() => {});
    }
  </script>
  <script>
    // ⚡ 탭바 뱃지 — sessionStorage 캐시 즉시 적용 (페이지 첫 페인트 전, 깜빡임 제거)
    try {
      var _bc = JSON.parse(sessionStorage.getItem('fp_tab_badges_v1') || '{}');
      Object.keys(_bc).forEach(function(id){
        var el = document.getElementById(id);
        if (!el) return;
        el.hidden = !(Number(_bc[id] || 0) > 0);
      });
    } catch (e) {}
  </script>
  <script>
    // 활성 탭
    (function(){
      const path = location.pathname;
      if (path.startsWith('/m/product-list')) document.querySelectorAll('.m-tab').forEach(t => t.classList.toggle('is-active', t.dataset.tab === 'product'));
      else if (path.startsWith('/m/chat')) document.querySelectorAll('.m-tab').forEach(t => t.classList.toggle('is-active', t.dataset.tab === 'chat'));
      else if (path.startsWith('/m/contract')) document.querySelectorAll('.m-tab').forEach(t => t.classList.toggle('is-active', t.dataset.tab === 'contract'));
      else if (path.startsWith('/m/settings')) document.querySelectorAll('.m-tab').forEach(t => t.classList.toggle('is-active', t.dataset.tab === 'settings'));
    })();
    // ⚡ 가로 스와이프 차단 (iOS edge swipe back, 가로 드래그)
    let _tx = 0, _ty = 0;
    document.addEventListener('touchstart', (e) => {
      if (e.touches.length !== 1) return;
      _tx = e.touches[0].clientX;
      _ty = e.touches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchmove', (e) => {
      if (e.touches.length !== 1) return;
      const dx = Math.abs(e.touches[0].clientX - _tx);
      const dy = Math.abs(e.touches[0].clientY - _ty);
      // 가로 움직임이 세로보다 크면 차단 (스와이프 뒤로가기 등)
      if (dx > dy && dx > 10) {
        // 단, 가로 스크롤 컨테이너 안이면 허용
        const scroller = e.target.closest('[data-scroll-x]');
        if (!scroller) e.preventDefault();
      }
    }, { passive: false });
    // ⚡ 컨텍스트 메뉴 차단 (길게 누르기로 메뉴 안 뜸)
    document.addEventListener('contextmenu', (e) => {
      const t = e.target;
      // input/textarea는 허용
      if (t.matches('input, textarea, [contenteditable=true]')) return;
      e.preventDefault();
    });
    // ⚡ 햅틱 진동 — click 이벤트 기반 (스크롤 시엔 발생 안 함, 실제 탭에서만)
    if ('vibrate' in navigator) {
      const HAPTIC_SEL = 'button, a, [role=button], .m-tab, .m-list-row, .m-product-card, .m-card, .m-icon-btn, label, summary, input[type=checkbox], input[type=radio], [data-haptic], .m-pd-gallery img';
      document.addEventListener('click', (e) => {
        // 풀스크린 사진 뷰어 안에서는 햅틱 안 함 (스크롤·스와이프용)
        if (e.target.closest('.fp-photo-viewer')) return;
        const t = e.target.closest(HAPTIC_SEL);
        if (t) navigator.vibrate(8);
      }, { passive: true, capture: true });
    }
    // ⚡ 탭 hover/touchstart 시 prefetch (실제 클릭 전에 미리 다운로드)
    document.querySelectorAll('.m-tab[href]').forEach(tab => {
      let prefetched = false;
      const prefetch = () => {
        if (prefetched) return;
        prefetched = true;
        const link = document.createElement('link');
        link.rel = 'prefetch';
        link.href = tab.href;
        document.head.appendChild(link);
      };
      tab.addEventListener('touchstart', prefetch, { passive: true });
      tab.addEventListener('mouseenter', prefetch);
    });
  </script>
  <!-- ⚡ 모든 페이지에서 글로벌 데이터 prefetcher 실행 -->
  <script type="module" src="{{ url_for('static', filename='js/mobile/prefetch.js') }}?v={{ app_version }}"></script>
  <script type="module" src="{{ url_for('static', filename='js/mobile/tab-badges.js') }}?v={{ app_version }}"></script>
  {% block page_js %}{% endblock %}
</body>
</html>
