{% extends 'pages/layout/workspace.html' %}
{% block workspace_page_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/admin.css') }}" data-page-style="true">
{% endblock %}
{% block page_title_text %}관리자 페이지{% endblock %}
{% block workspace_body %}
<div class="work-page min-h-work layout-39">

  <!-- ━━━ 좌측(3): 관리 메뉴 ━━━ -->
  <section class="panel pls-grid-panel">
    <div class="panel-head panel-head-default">
      <div class="panel-head-title-wrap">
        <div class="panel-head-title">관리 항목</div>
      </div>
    </div>
    <div class="pls-grid-scroll">
      <nav class="admin-menu" id="adminMenu">
        <button class="admin-menu-item is-active" data-tab="settlement" type="button">정산서 관리</button>
        <button class="admin-menu-item" data-tab="stock" type="button">재고 일괄삭제</button>
        <button class="admin-menu-item" data-tab="notice" type="button">안내사항 관리</button>
        <button class="admin-menu-item" data-tab="vehicle" type="button">차종 관리</button>
        <button class="admin-menu-item" data-tab="color" type="button">색상 관리</button>
        <button class="admin-menu-item" data-tab="upload" type="button">상품업로드</button>
      </nav>
    </div>
  </section>

  <!-- ━━━ 우측(9): 작업 영역 ━━━ -->
  <section class="panel admin-workspace-panel">
    <div class="panel-head panel-head-default">
      <div class="panel-head-title-wrap">
        <div class="panel-head-title" id="adminPanelTitle">정산서 관리</div>
      </div>
    </div>
    <div class="panel-body admin-workspace-body">

      <!-- 정산서 관리 -->
      <div class="admin-tab-panel" data-tab-panel="settlement">
        <div class="admin-tab-bar">
          <input type="search" id="adminStlSearch" class="admin-tab-bar__search" placeholder="차량번호·고객명 검색">
          <select id="adminStlYear" class="admin-filter-select"></select>
          <select id="adminStlMonth" class="admin-filter-select"></select>
          <select id="adminStlPartner" class="admin-filter-select"><option value="">전체 공급사</option></select>
          <select id="adminStlChannel" class="admin-filter-select"><option value="">전체 영업채널</option></select>
          <select id="adminStlAgent" class="admin-filter-select"><option value="">전체 영업자</option></select>
          <span id="adminStlCount" class="admin-tab-bar__count"></span>
          <span class="admin-tab-bar__spacer"></span>
          <button class="inline-button btn-sm" id="adminStlExportCsv" type="button">CSV 다운로드</button>
        </div>
        <div class="admin-tab-scroll">
          <table class="pls-table" style="min-width:1100px">
            <thead id="adminStlHead"></thead>
            <tbody id="adminStlList"></tbody>
          </table>
        </div>
      </div>

      <!-- 재고 일괄삭제 -->
      <div class="admin-tab-panel" data-tab-panel="stock" hidden>
        <div class="admin-tab-bar">
          <input type="search" id="adminStockSearch" class="admin-tab-bar__search" placeholder="차량번호 검색">
          <select id="adminStockPartner" class="admin-filter-select"><option value="">전체 파트너</option></select>
          <select id="adminStockStatus" class="admin-filter-select"><option value="">전체 차량상태</option></select>
          <select id="adminStockType" class="admin-filter-select"><option value="">전체 상품구분</option></select>
          <select id="adminStockMaker" class="admin-filter-select"><option value="">전체 제조사</option></select>
          <span id="adminStockCount" class="admin-tab-bar__count"></span>
          <span class="admin-tab-bar__spacer"></span>
          <button type="button" class="inline-button btn-sm" id="adminStockSelectAll">전체선택</button>
          <button type="button" class="inline-button btn-sm" id="adminStockDeselectAll">전체해제</button>
          <button type="button" class="inline-button btn-sm btn-danger" id="adminStockDeleteSelected">선택 삭제</button>
        </div>
        <div id="adminStockList" class="admin-tab-scroll"></div>
      </div>

      <!-- 차종 관리 -->
      <div class="admin-tab-panel" data-tab-panel="vehicle" hidden>
        <div class="admin-vm-form">
          <div class="admin-vm-row">
            <label>제조사<input type="text" id="vmMaker" placeholder="예: 현대"></label>
            <label>모델명<input type="text" id="vmModel" placeholder="예: 그랜저"></label>
            <label>세부모델<input type="text" id="vmSub" placeholder="예: 그랜저 GN7 22~"></label>
            <label>분류<input type="text" id="vmCat" placeholder="예: 준대형 세단"></label>
            <button type="button" class="inline-button btn-sm btn-primary" id="vmSaveBtn">저장하기</button>
            <button type="button" class="inline-button btn-sm" id="vmImportBtn" title="기존 등록된 상품에서 제조사/모델/세부모델을 자동 추출해 채웁니다">기존 상품에서 가져오기</button>
          </div>
          <div class="admin-vm-search">
            <select id="vmFilterMaker" class="admin-filter-select"><option value="">전체 제조사</option></select>
            <select id="vmFilterModel" class="admin-filter-select"><option value="">전체 모델</option></select>
            <input type="search" id="vmSearch" placeholder="제조사·모델·세부모델 검색">
            <span id="vmCount" class="admin-tab-bar__count"></span>
          </div>
        </div>
        <div class="admin-tab-scroll">
          <table class="pls-table" id="vmTable" style="min-width:800px">
            <thead><tr><th>제조사</th><th>모델</th><th>세부모델</th><th>분류</th><th style="width:90px">작업</th></tr></thead>
            <tbody id="vmList"></tbody>
          </table>
        </div>
      </div>

      <!-- 색상 관리 -->
      <div class="admin-tab-panel" data-tab-panel="color" hidden>
        <div class="admin-tab-bar">
          <button type="button" class="inline-button btn-sm" id="colorImportBtn" title="기존 등록된 상품의 외부/내부 색상을 자동 추출해 채웁니다">기존 상품에서 가져오기</button>
        </div>
        <div class="admin-color-form">
          <div class="admin-color-section">
            <div class="admin-color-title">외부 색상 <span id="extColorCount" class="admin-tab-bar__count"></span></div>
            <div class="admin-color-row">
              <input type="text" id="extColorInput" placeholder="예: 화이트">
              <button type="button" class="inline-button btn-sm btn-primary" id="extColorAddBtn">저장하기</button>
              <input type="search" id="extColorSearch" placeholder="검색">
            </div>
            <div id="extColorList" class="admin-color-chips"></div>
          </div>
          <div class="admin-color-section">
            <div class="admin-color-title">내부 색상 <span id="intColorCount" class="admin-tab-bar__count"></span></div>
            <div class="admin-color-row">
              <input type="text" id="intColorInput" placeholder="예: 블랙">
              <button type="button" class="inline-button btn-sm btn-primary" id="intColorAddBtn">저장하기</button>
              <input type="search" id="intColorSearch" placeholder="검색">
            </div>
            <div id="intColorList" class="admin-color-chips"></div>
          </div>
        </div>
      </div>

      <!-- 안내사항 관리 -->
      <div class="admin-tab-panel" data-tab-panel="notice" hidden>
        <div class="admin-tab-bar">
          <button class="inline-button btn-sm" id="adminNoticeNew" type="button">신규</button>
          <button class="inline-button btn-sm" id="adminNoticeEditSave" type="button">수정</button>
          <button class="inline-button btn-sm btn-danger" id="adminNoticeDelete" type="button">삭제</button>
        </div>
        <div class="admin-notice-split">
          <div id="adminNoticeList" class="admin-notice-list admin-notice-split__list"></div>
          <div class="admin-notice-split__form">
            <div class="manage-idle-hint" id="adminNoticeIdleHint">목록에서 안내사항을 선택하거나<br>신규를 눌러주세요.</div>
            <form class="admin-notice-form" id="adminNoticeForm" hidden>
              <div class="field full"><label for="admin_notice_title">제목</label>
                <input id="admin_notice_title" type="text" maxlength="80" placeholder="안내사항 제목" autocomplete="off">
              </div>
              <div class="field full"><label for="admin_notice_body">내용</label>
                <textarea id="admin_notice_body" rows="6" maxlength="2000" placeholder="안내사항 내용을 입력하세요."></textarea>
              </div>
              <div class="field full">
                <label>이미지 첨부 <span class="field-hint">(선택)</span></label>
                <input type="file" id="admin_notice_img" accept="image/*" hidden>
                <label class="inline-button btn-sm" id="adminNoticeImgPickBtn" for="admin_notice_img">이미지 선택</label>
                <div class="img-thumb-list" id="adminNoticeThumbList" style="margin-top:8px"></div>
              </div>
              <p class="message" id="adminNoticeMessage"></p>
            </form>
          </div>
        </div>
      </div>

      <!-- 상품업로드 -->
      <div class="admin-tab-panel" data-tab-panel="upload" hidden>
        <iframe id="adminUploadFrame" style="width:100%;height:calc(100vh - 160px);border:none;" srcdoc=""></iframe>
      </div>

    </div>
  </section>

</div>
{% endblock %}
{% block workspace_page_js %}
<script type="module" src="{{ url_for('static', filename='js/pages/admin.js') }}" data-page-script="true"></script>
{% endblock %}
