{% extends 'pages/layout/workspace-mobile.html' %}
{% block workspace_body %}
<script>document.body.classList.add('page-product');</script>
<div class="work-page min-h-work product-list-page-shell" id="productListShell">

<!-- 필터 사이드바 -->
<div class="m-filter-overlay" id="plsMCatalogOverlay"></div>
<aside class="m-filter-sidebar catalog-sidebar" id="plsMCatalogSidebar">
  <div class="catalog-sidebar__head">
    <span class="catalog-sidebar__head-title">필터</span>
    <button class="catalog-sidebar__close" id="plsMCatalogClose" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </div>
  <div class="catalog-sidebar__summary">
    <div class="catalog-sidebar__count">
      <span class="catalog-sidebar__count-label">상품차량</span>
      <span class="catalog-sidebar__count-value" id="plsMCatalogCount">0</span><span class="catalog-sidebar__count-unit">대</span>
    </div>
    <button class="catalog-sidebar__reset" id="plsMCatalogReset" type="button">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      선택 초기화
    </button>
  </div>
  <div class="catalog-sidebar__search">
    <svg class="catalog-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input class="catalog-search" id="plsMCatalogSearch" type="search" placeholder="모델명, 차량번호 검색...">
  </div>
  <div id="plsMCatalogFilterSections"></div>
</aside>

<!-- 검색 + 필터 바 -->
<div class="m-search-bar">
  <div class="m-search-bar__input-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="search" id="plsMSearchInput" class="m-search-bar__input" placeholder="모델명, 차량번호 검색...">
  </div>
  <button type="button" id="plsMFilterBtn" class="m-search-bar__filter-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 5h20"/><path d="M6 12h12"/><path d="M9 19h6"/></svg>
  </button>
</div>

<!-- 카탈로그 그리드 -->
<div class="pls-m-catalog-wrap">
  <div class="catalog-content">
    <div class="catalog-grid" id="plsMCatalogGrid">
      <div class="catalog-skeleton-wrap">
        <div class="catalog-skeleton-card"></div>
        <div class="catalog-skeleton-card"></div>
        <div class="catalog-skeleton-card"></div>
        <div class="catalog-skeleton-card"></div>
      </div>
    </div>
  </div>
</div>

<!-- 상세 패널 (카드 클릭 시 상단바 아래 전체화면, 핸드폰 뒤로가기로 닫힘) -->
<div class="pls-m-detail" id="plsMDetail" hidden>
  <div class="pls-m-detail__body" id="plsMDetailBody">
    <div class="detail-card" id="plsMDetailContent"></div>
  </div>
</div>

</div>
{% endblock %}
{% block workspace_page_js %}
<script type="module" src="{{ url_for('static', filename='js/mobile/product-list.js') }}" data-page-script="true"></script>
{% endblock %}
