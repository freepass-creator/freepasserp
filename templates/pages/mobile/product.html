{% extends 'pages/layout/workspace-mobile.html' %}
{% block workspace_body %}
<div class="work-page min-h-work product-list-page-shell" id="productListShell">

<!-- 검색바 -->
<div class="m-search-bar">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
  <input type="search" id="plsMCatalogSearch" placeholder="모델명, 차량번호 검색..." autocomplete="off">
  <span class="m-search-count" id="plsMCatalogCount"></span>
</div>

<!-- 카탈로그 그리드 -->
<div class="pls-m-catalog-wrap">
  <div class="catalog-content">
    <div class="catalog-grid" id="plsMCatalogGrid">
      <div class="catalog-skeleton-wrap">
        <div class="catalog-skeleton-card"></div>
        <div class="catalog-skeleton-card"></div>
        <div class="catalog-skeleton-card"></div>
        <div class="catalog-skeleton-card"></div>
      </div>
    </div>
  </div>
</div>

<!-- 상세 패널 (카드 클릭 시 상단바 아래 전체화면, 핸드폰 뒤로가기로 닫힘) -->
<div class="pls-m-detail" id="plsMDetail" hidden>
  <div class="pls-m-detail__body" id="plsMDetailBody">
    <div class="detail-card" id="plsMDetailContent"></div>
  </div>
</div>

</div>
{% endblock %}
{% block workspace_page_js %}
<script type="module" src="{{ url_for('static', filename='js/mobile/product-list.js') }}" data-page-script="true"></script>
{% endblock %}
