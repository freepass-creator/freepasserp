{% extends 'pages/layout/workspace-mobile.html' %}
{% block workspace_body %}
<div class="work-page min-h-work settings-page-shell">
<section class="panel panel--form">
<div class="panel-head panel-head-default">
<div class="panel-head-title-wrap">
<div class="panel-head-title">사용자 설정</div>
</div>
<div class="panel-head-actions">
<button class="inline-button btn-icon-only btn-tone-save" id="settings-profile-submit" title="수정" type="button"><span class="btn-mode-icon btn-mode-icon--view"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"/></svg></span><span class="btn-mode-icon btn-mode-icon--write"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/><path d="M7 3v4a1 1 0 0 0 1 1h7"/></svg></span></button>
</div>
</div>
<div class="panel-body manage-form-body">
<section class="form-section">
<div class="section-title">계정정보</div>
<form class="form-grid manage-form-shell ui-mode-view" id="settings-profile-form">
<input id="settings-status" type="hidden"/>
<input id="settings-role" type="hidden"/>
<div class="field"><label>계정상태</label><input id="settings-account-status" readonly/></div>
<div class="field"><label>회원구분</label><input id="settings-account-role" readonly/></div>
<div class="field"><label>소속코드</label><input id="settings-company-code" readonly/></div>
<div class="field"><label>소속회사</label><input id="settings-company-name" readonly/></div>
<div class="field"><label>계정코드</label><input id="settings-user-code" readonly/></div>
<div class="field"><label>이메일</label><input id="settings-email" readonly/></div>
<div class="field"><label>이름</label><input id="settings-name"/></div>
<div class="field"><label>직급</label><input id="settings-position"/></div>
<div class="field"><label>연락처</label><input id="settings-phone"/></div>
<div class="field"><label>기타정보</label><input id="settings-note"/></div>
</form>
</section>
<section class="form-section">
<div class="section-title">계정관리</div>
<div class="settings-account-actions" id="settings-account-actions">
<div class="settings-account-action-row" data-action="password">
<span class="settings-action-label">비밀번호 변경</span>
<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
</div>
<div class="settings-account-action-expand" id="password-change-panel" hidden>
<p class="settings-helper">등록된 이메일로 비밀번호 재설정 링크를 발송합니다.</p>
<button class="btn-primary" id="send-password-reset-button" type="button">재설정 메일 발송</button>
</div>
<div class="settings-account-action-row" data-action="logout">
<span class="settings-action-label">로그아웃</span>
<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg>
</div>
</div>
</section>
</div>
</section>
</div>
{% endblock %}
{% block workspace_page_js %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/settings.css') }}">
<script type="module" src="{{ url_for('static', filename='js/pages/settings.js') }}" data-page-script="true"></script>
{% endblock %}
