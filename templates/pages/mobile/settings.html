{% extends 'pages/layout/workspace-mobile.html' %}
{% block workspace_body %}
<script>document.body.classList.add('page-settings');</script>
<div class="work-page min-h-work m-settings-page">

  <!-- 내 정보 -->
  <section class="m-settings-section">
    <div class="m-settings-title">내 정보</div>
    <div class="m-settings-card">
      <div class="m-settings-row">
        <span class="m-settings-label">소속</span>
        <span class="m-settings-value" id="ms-company">-</span>
      </div>
      <div class="m-settings-row">
        <span class="m-settings-label">이름</span>
        <span class="m-settings-value" id="ms-name">-</span>
      </div>
      <div class="m-settings-row">
        <span class="m-settings-label">직급</span>
        <span class="m-settings-value" id="ms-position">-</span>
      </div>
      <div class="m-settings-row">
        <span class="m-settings-label">이메일</span>
        <span class="m-settings-value" id="ms-email">-</span>
      </div>
      <div class="m-settings-row">
        <span class="m-settings-label">연락처</span>
        <span class="m-settings-value" id="ms-phone">-</span>
      </div>
      <div class="m-settings-row">
        <span class="m-settings-label">계정코드</span>
        <span class="m-settings-value" id="ms-code">-</span>
      </div>
      <div class="m-settings-row">
        <span class="m-settings-label">구분</span>
        <span class="m-settings-value" id="ms-role">-</span>
      </div>
      <div class="m-settings-row">
        <span class="m-settings-label">상태</span>
        <span class="m-settings-value" id="ms-status">-</span>
      </div>
    </div>
    <p class="m-settings-hint">정보 수정은 PC 웹에서 가능합니다.</p>
  </section>

  <!-- 내 카탈로그 -->
  <section class="m-settings-section">
    <div class="m-settings-title">내 카탈로그</div>
    <div class="m-settings-card">
      <input class="m-settings-url" id="ms-catalog-url" readonly>
      <div class="m-settings-actions">
        <button class="m-settings-btn" id="ms-catalog-copy" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          링크 복사
        </button>
        <button class="m-settings-btn m-settings-btn--primary" id="ms-catalog-share" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>
          공유하기
        </button>
      </div>
    </div>
    <p class="m-settings-hint">고객에게 내 상품을 보여주는 링크입니다.</p>
  </section>

  <!-- 앱 설치 -->
  <section class="m-settings-section" id="ms-install-section" hidden>
    <div class="m-settings-title">앱 설치</div>
    <div class="m-settings-card">
      <div class="m-settings-actions">
        <button class="m-settings-btn m-settings-btn--primary" id="ms-install-btn" type="button" style="flex:1;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="m7 10 5 5 5-5"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg>
          앱 설치
        </button>
      </div>
    </div>
    <p class="m-settings-hint" id="ms-install-hint">앱을 설치하면 더 빠르게 이용할 수 있습니다.</p>
  </section>

  <!-- 로그아웃 -->
  <section class="m-settings-section">
    <button class="m-settings-logout" id="ms-logout" type="button">로그아웃</button>
  </section>

</div>
{% endblock %}
{% block workspace_page_js %}
<script type="module" src="{{ url_for('static', filename='js/mobile/settings.js') }}" data-page-script="true"></script>
{% endblock %}
