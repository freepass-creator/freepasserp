{% extends 'pages/layout/workspace-mobile.html' %}
{% block workspace_body %}
<script>document.body.classList.add('page-settings');</script>
<div class="work-page min-h-work m-settings-page">

  <!-- 내 정보 -->
  <div class="m-form-section">
    <div class="m-form-section-head"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>내 정보</div>
    <div class="m-form-fields">
      <label class="m-form-field"><span>소속</span><input id="ms-company" value="-" readonly></label>
      <label class="m-form-field"><span>이름</span><input id="ms-name" value="-" readonly></label>
      <label class="m-form-field"><span>직급</span><input id="ms-position" value="-" readonly></label>
      <label class="m-form-field"><span>이메일</span><input id="ms-email" value="-" readonly></label>
      <label class="m-form-field"><span>연락처</span><input id="ms-phone" value="-" readonly></label>
      <label class="m-form-field"><span>계정코드</span><input id="ms-code" value="-" readonly></label>
      <label class="m-form-field"><span>구분</span><input id="ms-role" value="-" readonly></label>
      <label class="m-form-field"><span>상태</span><input id="ms-status" value="-" readonly></label>
    </div>
  </div>

  <!-- 내 카탈로그 -->
  <div class="m-form-section">
    <div class="m-form-section-head"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>내 카탈로그</div>
    <div class="m-form-fields">
      <label class="m-form-field"><span>링크</span><input id="ms-catalog-url" readonly style="font-size:11px!important;"></label>
    </div>
    <div class="m-form-actions" style="padding:10px 16px;">
      <button class="m-form-btn" id="ms-catalog-copy" type="button" style="flex:1;height:40px;border-radius:10px;background:rgba(0,0,0,0.05);color:#334155;font-size:13px;font-weight:600;border:none;display:flex;align-items:center;justify-content:center;gap:6px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        복사
      </button>
      <button class="m-form-btn" id="ms-catalog-share" type="button" style="flex:1;height:40px;border-radius:10px;background:#1b2a4a;color:#fff;font-size:13px;font-weight:600;border:none;display:flex;align-items:center;justify-content:center;gap:6px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>
        공유
      </button>
    </div>
  </div>

  <!-- 앱 설치 -->
  <div class="m-form-section" id="ms-install-section" hidden>
    <div class="m-form-section-head"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="m7 10 5 5 5-5"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg>앱 설치</div>
    <div class="m-form-actions" style="padding:10px 16px;">
      <button class="m-form-btn--save" id="ms-install-btn" type="button">앱 설치</button>
    </div>
    <p class="m-settings-hint" id="ms-install-hint">앱을 설치하면 더 빠르게 이용할 수 있습니다.</p>
  </div>

  <!-- 로그아웃 -->
  <div style="padding:0;">
    <button class="m-settings-logout" id="ms-logout" type="button">로그아웃</button>
  </div>

</div>
{% endblock %}
{% block workspace_page_js %}
<script type="module" src="{{ url_for('static', filename='js/mobile/settings.js') }}" data-page-script="true"></script>
{% endblock %}
