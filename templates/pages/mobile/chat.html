{% extends 'pages/layout/workspace-mobile.html' %}
{% block mobile_topbar %}
<div class="m-search-bar" style="flex:1;border:none;padding:6px 8px;">
  <div class="m-search-bar__input-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="search" id="chatMSearchInput" class="m-search-bar__input" placeholder="상대방, 차량번호 검색...">
  </div>
  <button type="button" id="chatMFilterBtn" class="m-search-bar__filter-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 5h20"/><path d="M6 12h12"/><path d="M9 19h6"/></svg>
  </button>
</div>
{% endblock %}
{% block workspace_body %}
<script>document.body.classList.add('page-chat');</script>
<div class="work-page min-h-work">

<!-- 방 목록 -->
<div class="chat-m-rooms" id="chatMRooms"></div>

<!-- 채팅방 (방 선택 시 전체화면) -->
<div class="m-chatroom" id="mChatroom" hidden>
  <div class="m-chatroom__head">
    <span class="m-chatroom__title" id="chat-code"></span>
    <div class="m-chatroom__actions">
      <button class="mobile-topbar__icon-btn" id="hideRoomBtn" type="button" title="숨김">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>
      </button>
      <button class="mobile-topbar__icon-btn" id="deleteRoomBtn" type="button" title="삭제" style="color:#ef4444">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 11v6"/><path d="M14 11v6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>
  </div>
  <div class="m-chatroom__messages" id="message-list"></div>
  <form class="m-chatroom__form" id="message-form" autocomplete="off">
    <input autocomplete="new-password" autocorrect="off" autocapitalize="off" spellcheck="false" data-form-type="other" data-lpignore="true" data-1p-ignore id="message-input" placeholder="메시지를 입력하세요." type="search" enterkeyhint="send"/>
    <button type="submit" title="전송">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3.714 3.048a.498.498 0 0 0-.683.627l2.843 7.627a2 2 0 0 1 0 1.396l-2.842 7.627a.498.498 0 0 0 .682.627l18-8.5a.5.5 0 0 0 0-.904z"/><path d="M6 12h16"/></svg>
    </button>
  </form>
</div>

<!-- 필터 -->
<div class="m-filter-overlay" id="chatMFilterOverlay"></div>
<aside class="m-filter-sidebar catalog-sidebar" id="chatMFilterSidebar">
  <div class="catalog-sidebar__head">
    <span class="catalog-sidebar__head-title">필터</span>
    <button class="catalog-sidebar__close" id="chatMFilterClose" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </div>
  <div class="catalog-sidebar__summary">
    <div class="catalog-sidebar__count">
      <span class="catalog-sidebar__count-label">대화</span>
      <span class="catalog-sidebar__count-value" id="chatMFilterCount">0</span><span class="catalog-sidebar__count-unit">건</span>
    </div>
  </div>
  <div class="catalog-sidebar__search">
    <svg class="catalog-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input class="catalog-search" id="chatMFilterSearch" type="search" placeholder="상대방, 상품명 검색...">
  </div>
</aside>
</div>
{% endblock %}
{% block workspace_page_js %}
<script type="module" src="{{ url_for('static', filename='js/mobile/chat.js') }}" data-page-script="true"></script>
{% endblock %}
