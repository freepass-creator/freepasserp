{% extends 'pages/layout/workspace-mobile.html' %}
{% block workspace_body %}
<div class="work-page min-h-work">
<!-- 계약 목록 -->
<div class="contract-m-list" id="contract-m-list" style="display:block;">
  <div class="m-list-empty">계약을 불러오는 중...</div>
</div>
<!-- 계약 상세 (카드 클릭 시 표시, 뒤로가기로 닫힘) -->
<div class="pls-m-detail" id="contract-m-detail" hidden></div>
<!-- 필터 사이드바 -->
<div class="m-filter-overlay" id="contractMFilterOverlay"></div>
<aside class="m-filter-sidebar catalog-sidebar" id="contractMFilterSidebar">
  <div class="catalog-sidebar__head">
    <span class="catalog-sidebar__head-title">필터</span>
    <button class="catalog-sidebar__close" id="contractMFilterClose" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </div>
  <div class="catalog-sidebar__summary">
    <div class="catalog-sidebar__count">
      <span class="catalog-sidebar__count-label">계약</span>
      <span class="catalog-sidebar__count-value" id="contractMFilterCount">0</span><span class="catalog-sidebar__count-unit">건</span>
    </div>
  </div>
  <div class="catalog-sidebar__search">
    <svg class="catalog-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input class="catalog-search" id="contractMFilterSearch" type="search" placeholder="고객명, 차량번호 검색...">
  </div>
</aside>
</div>
{% endblock %}
{% block workspace_page_js %}
<script type="module" src="{{ url_for('static', filename='js/mobile/contract.js') }}" data-page-script="true"></script>
{% endblock %}
