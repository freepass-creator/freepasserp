{% extends 'base-mobile.html' %}
{% block body %}
<div class="dashboard-shell dashboard-shell--new">
  <div class="main-area">
    <!-- 모바일 공통 상단바 프레임 -->
    <div class="mobile-topbar" id="mobile-topbar">
      <!-- 뒤로가기 + 타이틀 (기본 숨김, 상세 진입 시 표시) -->
      <button class="m-back-btn" id="m-back-btn" type="button" aria-label="뒤로가기" style="display:none">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <span class="m-back-title" id="m-back-title" style="display:none"></span>
      {% block mobile_topbar %}{% endblock %}
    </div>
    <main class="main-shell main-shell--new">
      {% block workspace_body %}{% endblock %}
    </main>
  </div>
</div>

<!-- 모바일 하단 탭바 -->
<nav class="mobile-tab-bar" id="mobile-tab-bar" role="tablist"></nav>

{% endblock %}
{% block page_js %}
<script type="module" src="{{ url_for('static', filename='js/core/mobile-shell.js') }}"></script>
{% block workspace_page_js %}{% endblock %}
{% endblock %}
