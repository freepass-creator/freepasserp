{% extends 'base-mobile.html' %}
{% block body %}
<div class="dashboard-shell dashboard-shell--new">
  <div class="main-area">
    <!-- 모바일 공통 상단바 프레임 -->
    <div class="mobile-topbar" id="mobile-topbar">
      {% block mobile_topbar %}
      <!-- 기본: 비어있음. 페이지별로 오버라이드 -->
      {% endblock %}
    </div>
    <main class="main-shell main-shell--new">
      {% block workspace_body %}{% endblock %}
    </main>
  </div>
</div>

<!-- 모바일 하단 탭바 -->
<nav class="mobile-tab-bar" id="mobile-tab-bar" role="tablist"></nav>

{% endblock %}
{% block page_js %}
<script type="module" src="{{ url_for('static', filename='js/core/mobile-shell.js') }}"></script>
{% block workspace_page_js %}{% endblock %}
{% endblock %}
