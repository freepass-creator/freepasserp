{% extends 'base.html' %}
{% block page_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/login.css') }}">{% endblock %}
{% block body %}
<div class="auth-shell">
  <div class="auth-brand">FREEPASS ERP</div>
  <section class="auth-card" aria-label="로그인">
    <header class="auth-card__head">
      <h2 class="auth-card__title">로그인</h2>
      <p class="auth-card__sub">이메일과 비밀번호를 입력해주세요.</p>
    </header>
    <form id="login-new-form" class="auth-form" novalidate>
      <div class="auth-field">
        <label for="login-new-email">이메일</label>
        <input id="login-new-email" name="email" type="email" placeholder="name@company.com" autocomplete="username" required>
      </div>
      <div class="auth-field">
        <label for="login-new-password">비밀번호</label>
        <input id="login-new-password" name="password" type="password" placeholder="비밀번호 입력" autocomplete="current-password" required>
      </div>
      <button type="submit" class="auth-submit">로그인</button>
    </form>
    <footer class="auth-footer">
      <a href="{{ url_for('auth.signup') }}">계정 만들기</a>
      <span aria-hidden="true">·</span>
      <a href="{{ url_for('auth.reset_password') }}">비밀번호 재설정</a>
    </footer>
    <p id="login-new-message" class="auth-message" aria-live="polite"></p>
  </section>
  <div class="auth-copyright">&copy; 2026 freepassmobility. All Rights Reserved.</div>
</div>
{% endblock %}
{% block page_js %}<script type="module" src="{{ url_for('static', filename='js/pages/login.js') }}"></script>{% endblock %}
