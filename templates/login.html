{% extends 'base.html' %}
{% block page_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/login.css') }}">
<style>
  /* 데스크탑에선 표시 안 함 — 모바일 전용 */
  @media (min-width: 769px) { .m-pwa-install { display: none !important; } }
  .m-pwa-install{position:fixed;left:8px;right:8px;bottom:calc(env(safe-area-inset-bottom) + 8px);z-index:300;background:#fff;border:1px solid #e2e8f0;border-radius:14px;box-shadow:0 8px 24px rgba(15,23,42,.12);padding:14px 16px;max-width:440px;margin:0 auto}
  .m-pwa-install__inner{display:flex;flex-direction:column;gap:10px}
  .m-pwa-install__text strong{display:block;font-size:14px;font-weight:700;color:#0f172a}
  .m-pwa-install__text span{display:block;font-size:12px;color:#64748b;margin-top:2px}
  .m-pwa-install__check{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#64748b;width:auto;-webkit-tap-highlight-color:transparent;outline:none!important;border:none!important;background:transparent!important}
  .m-pwa-install__check:focus,.m-pwa-install__check:focus-visible,.m-pwa-install__check:active{outline:none!important;box-shadow:none!important}
  .m-pwa-install__check input[type=checkbox]{margin:0;width:14px;height:14px;-webkit-tap-highlight-color:transparent;outline:none!important;border:none;box-shadow:none!important}
  .m-pwa-install__check input[type=checkbox]:focus,.m-pwa-install__check input[type=checkbox]:focus-visible,.m-pwa-install__check input[type=checkbox]:active{outline:none!important;box-shadow:none!important}
  .m-pwa-install__actions{display:flex;gap:8px;justify-content:flex-end}
  .m-pwa-install__btn{border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer}
  .m-pwa-install__btn--dismiss{background:#f1f5f9;color:#64748b}
  .m-pwa-install__btn--accept{background:#1b2a4a;color:#fff}
</style>
{% endblock %}
{% block body %}
<div class="auth-shell">
  <div class="auth-brand">FREEPASS ERP</div>
  <section class="auth-card" aria-label="로그인">
    <header class="auth-card__head">
      <h2 class="auth-card__title">로그인</h2>
      <p class="auth-card__sub">이메일과 비밀번호를 입력해주세요.</p>
    </header>
    <form id="login-new-form" class="auth-form" novalidate>
      <div class="auth-field">
        <label for="login-new-email">이메일</label>
        <input id="login-new-email" name="email" type="email" placeholder="name@company.com" autocomplete="username" required>
      </div>
      <div class="auth-field">
        <label for="login-new-password">비밀번호</label>
        <input id="login-new-password" name="password" type="password" placeholder="비밀번호 입력" autocomplete="current-password" required>
      </div>
      <button type="submit" class="auth-submit">로그인</button>
    </form>
    <footer class="auth-footer">
      <a href="{{ url_for('auth.signup') }}">계정 만들기</a>
      <span aria-hidden="true">·</span>
      <a href="{{ url_for('auth.reset_password') }}">비밀번호 재설정</a>
    </footer>
    <p id="login-new-message" class="auth-message" aria-live="polite"></p>
  </section>
  <div class="auth-copyright">&copy; 2026 freepassmobility. All Rights Reserved.</div>
</div>

<!-- PWA 설치 배너 (모바일 _layout.html과 동일 UI) -->
<div class="m-pwa-install" id="m-pwa-install" hidden>
  <div class="m-pwa-install__inner">
    <div class="m-pwa-install__text">
      <strong>FREEPASS 앱 설치</strong>
      <span>설치하고 더 빠르게 사용해보세요</span>
    </div>
    <label class="m-pwa-install__check">
      <input type="checkbox" id="m-pwa-install-7d"> 7일간 묻지 않기
    </label>
    <div class="m-pwa-install__actions">
      <button type="button" class="m-pwa-install__btn m-pwa-install__btn--dismiss" id="m-pwa-install-close">닫기</button>
      <button type="button" class="m-pwa-install__btn m-pwa-install__btn--accept" id="m-pwa-install-ok">설치</button>
    </div>
  </div>
</div>
<script>
  (function(){
    // 데스크탑 가드 — 모바일 viewport에서만 배너 동작
    if (window.matchMedia('(min-width: 769px)').matches) return;
    var deferredPrompt = null;
    var DISMISS_KEY = 'fp_pwa_install_dismiss_until';
    if (window.matchMedia('(display-mode: standalone)').matches) return;
    var dismissUntil = parseInt(localStorage.getItem(DISMISS_KEY) || '0', 10);
    var dismissed = Date.now() < dismissUntil;
    window.addEventListener('beforeinstallprompt', function(e){
      e.preventDefault();
      deferredPrompt = e;
      window.__fpInstallPrompt = e;
      if (!dismissed) {
        var b = document.getElementById('m-pwa-install');
        if (b) b.hidden = false;
      }
    });
    function closeBanner(){
      var b = document.getElementById('m-pwa-install');
      if (b) b.hidden = true;
      var c = document.getElementById('m-pwa-install-7d');
      if (c && c.checked) localStorage.setItem(DISMISS_KEY, String(Date.now() + 7*24*60*60*1000));
    }
    document.addEventListener('click', function(e){
      if (e.target.closest('#m-pwa-install-close')) closeBanner();
      else if (e.target.closest('#m-pwa-install-ok')) {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.finally(function(){ deferredPrompt = null; window.__fpInstallPrompt = null; closeBanner(); });
        } else closeBanner();
      }
    });
  })();
</script>
{% endblock %}
{% block page_js %}<script type="module" src="{{ url_for('static', filename='js/pages/login.js') }}"></script>{% endblock %}
