{% extends 'base.html' %}
{% block page_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/pages_new/login_new.css') }}">{% endblock %}
{% block body %}
<div class="auth-shell">
  <div class="auth-brand">FREEPASS ERP 2026</div>
  <section class="auth-card" aria-label="비밀번호 재설정">
    <header class="auth-card__head">
      <h2 class="auth-card__title">비밀번호 재설정</h2>
      <p class="auth-card__sub">등록된 이메일을 입력하면 재설정 링크가 발송됩니다.</p>
    </header>
    <form id="reset-form" class="auth-form" novalidate>
      <div class="auth-field">
        <label for="reset-email">이메일</label>
        <input id="reset-email" type="email" placeholder="name@company.com" autocomplete="email" required>
      </div>
      <button type="submit" class="auth-submit" id="reset-submit">재설정 메일 발송</button>
    </form>
    <footer class="auth-footer">
      <a href="{{ url_for('auth.login') }}">로그인으로 돌아가기</a>
    </footer>
    <p id="reset-message" class="auth-message" aria-live="polite"></p>
  </section>
  <div class="auth-copyright">&copy; 2026 freepassmobility. All Rights Reserved.</div>
</div>
{% endblock %}
{% block page_js %}
<script type="module">
import { sendPasswordReset } from '/static/js/firebase/firebase-auth.js';

const form = document.getElementById('reset-form');
const emailInput = document.getElementById('reset-email');
const message = document.getElementById('reset-message');

form?.addEventListener('submit', async (event) => {
  event.preventDefault();
  const email = String(emailInput?.value || '').trim();
  if (!email) {
    message.textContent = '이메일을 입력하세요.';
    message.className = 'auth-message';
    return;
  }
  try {
    message.textContent = '발송 중...';
    message.className = 'auth-message';
    await sendPasswordReset(email);
    message.textContent = `${email}로 비밀번호 재설정 링크를 발송했습니다.`;
    message.className = 'auth-message auth-message--success';
  } catch (error) {
    message.textContent = `발송 실패: ${error.message}`;
    message.className = 'auth-message';
  }
});
</script>
{% endblock %}
