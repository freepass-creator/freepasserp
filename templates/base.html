<!DOCTYPE html>
<html lang="ko" class="no-transition">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1b2a4a">
  <meta name="description" content="장기렌터카, 구독서비스 영업전용 ERP">
  <title>FREEPASS ERP{% if page_title %} · {{ page_title }}{% endif %}</title>
  <!-- Open Graph (카톡/링크 미리보기) -->
  <meta property="og:site_name" content="FREEPASS ERP">
  <meta property="og:title" content="FREEPASS ERP">
  <meta property="og:description" content="장기렌터카, 구독서비스 영업전용 ERP">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ request.url }}">
  <meta property="og:image" content="{{ url_for('static', filename='og-image.svg', _external=True) }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:type" content="image/svg+xml">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="FREEPASS ERP">
  <meta name="twitter:description" content="장기렌터카, 구독서비스 영업전용 ERP">
  <meta name="twitter:image" content="{{ url_for('static', filename='og-image.svg', _external=True) }}">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/icon.svg') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://www.gstatic.com">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/reset.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ui_tokens.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/panel.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/detail.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/table.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/form.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/button.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/filter.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/list.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ui_states.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ui_primitives.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ui_management.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ui_datagrid.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ui_upload.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ui_toast.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}?v={{ app_version }}">
  {% block page_css %}{% endblock %}
</head>
<body data-page="{{ page_title }}">
  {% block body %}{% endblock %}
  <script>
    window.APP_VER='{{ app_version }}';
    requestAnimationFrame(()=>requestAnimationFrame(()=>document.documentElement.classList.remove('no-transition')));
    if('serviceWorker' in navigator){navigator.serviceWorker.register('/static/sw.js').catch(()=>{});}
  </script>
  <script type="module" src="{{ url_for('static', filename='js/app.js') }}?v={{ app_version }}"></script>
  {% block page_js %}{% endblock %}
</body>
</html>
