<!DOCTYPE html>
<html lang="ko" class="is-mobile">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1b2a4a">
  <meta name="description" content="FREEPASS ERP — 렌터카 장기렌트 B2B 관리 시스템">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FREEPASS ERP">
  <title>{{ page_title }} — FREEPASS ERP</title>
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/icon.svg') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/reset.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile-app.css') }}?v={{ app_version }}">
  {% block page_css %}{% endblock %}
</head>
<body class="mobile-app" data-page="{{ page_title }}">
  {% block body %}{% endblock %}

  <!-- 앱 설치 유도 (브라우저에서만, 설치 후에는 자동 숨김) -->
  <div id="pwa-install-banner" class="pwa-install-banner" hidden>
    <div class="pwa-install-banner__content">
      <img src="{{ url_for('static', filename='icons/icon-192.png') }}" alt="" width="40" height="40" class="pwa-install-banner__icon">
      <div class="pwa-install-banner__text">
        <strong>FREEPASS ERP</strong>
        <span>앱을 설치하면 더 빠르게 이용할 수 있어요</span>
      </div>
    </div>
    <div class="pwa-install-banner__actions">
      <button type="button" id="pwa-install-dismiss" class="pwa-install-banner__btn pwa-install-banner__btn--dismiss">닫기</button>
      <button type="button" id="pwa-install-accept" class="pwa-install-banner__btn pwa-install-banner__btn--accept">설치</button>
    </div>
  </div>

  <script>
    window.APP_VER='{{ app_version }}';
    if('serviceWorker' in navigator){navigator.serviceWorker.register('/static/sw.js').catch(()=>{});}

    // 앱 설치 프롬프트 (standalone이면 배너 제거)
    (function(){
      var banner=document.getElementById('pwa-install-banner');
      if(window.matchMedia('(display-mode: standalone)').matches||navigator.standalone){
        banner.remove(); return;
      }
      var deferredPrompt=null;
      var DISMISS_KEY='fp.pwa.dismissed';

      function hide(){
        banner.hidden=true;
        banner.style.display='none';
        localStorage.setItem(DISMISS_KEY,String(Date.now()));
      }

      window.addEventListener('beforeinstallprompt',function(e){
        e.preventDefault();
        deferredPrompt=e;
        var d=localStorage.getItem(DISMISS_KEY);
        if(d&&Date.now()-Number(d)<86400000)return;
        banner.hidden=false;
        banner.style.display='';
      });

      document.getElementById('pwa-install-accept').addEventListener('click',function(){
        if(!deferredPrompt){hide();return;}
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(){deferredPrompt=null;hide();});
      });

      document.getElementById('pwa-install-dismiss').addEventListener('click',hide);
      window.addEventListener('appinstalled',function(){deferredPrompt=null;hide();});

      // iOS는 beforeinstallprompt 미지원 → 직접 안내
      if(/iPhone|iPad/.test(navigator.userAgent)&&!navigator.standalone){
        var d=localStorage.getItem(DISMISS_KEY);
        if(!d||Date.now()-Number(d)>=86400000){
          banner.querySelector('.pwa-install-banner__text span').textContent='공유 버튼 → 홈 화면에 추가로 설치하세요';
          banner.querySelector('#pwa-install-accept').textContent='확인';
          banner.querySelector('#pwa-install-accept').addEventListener('click',hide);
          banner.hidden=false;
          banner.style.display='';
        }
      }
    })();
  </script>
  <script type="module" src="{{ url_for('static', filename='js/app-mobile.js') }}?v={{ app_version }}"></script>
  {% block page_js %}{% endblock %}
</body>
</html>
