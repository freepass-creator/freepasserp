{% extends 'new/layout/workspace_new.html' %}
{% block workspace_page_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages_new/product_list_new.css') }}" data-page-style="true">
{% endblock %}
{% block page_title_text %}전체 상품 검색{% endblock %}
{% block top_bar_actions %}
<div class="period-selector" id="periodSelector">
<div class="period-selector__chips" id="periodChips">
<label class="period-chip"><input type="checkbox" value="1"><span>1M</span></label>
<label class="period-chip"><input type="checkbox" value="12"><span>12M</span></label>
<label class="period-chip"><input type="checkbox" value="24"><span>24M</span></label>
<label class="period-chip"><input type="checkbox" value="36"><span>36M</span></label>
<label class="period-chip"><input type="checkbox" value="48" checked><span>48M</span></label>
<label class="period-chip"><input type="checkbox" value="60"><span>60M</span></label>
</div>
<button class="period-selector__toggle" id="periodToggle" type="button"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="m9 16 2 2 4-4"/></svg><span>기간</span></button>
</div>
{% endblock %}
{% block workspace_body %}
<div class="work-page min-h-work product-list-page-shell" id="productListShell">

<!-- ━━━ 엑셀 데이터 그리드 (전체 화면) ━━━ -->
<section class="panel pls-grid-panel">
<div class="pls-grid-scroll" id="plsGridScroll">
  <table class="pls-table" id="plsTable">
    <thead id="plsGridHeader"></thead>
    <tbody id="productList"></tbody>
  </table>
</div>
</section>

<!-- ━━━ 상세 슬라이드 패널 (행 선택 시 등장) ━━━ -->
<aside class="pls-detail-panel" id="plsDetailPanel" hidden>
<div class="panel-head panel-head-default">
  <div class="panel-head-title-wrap">
    <div class="panel-head-title" id="detailPanelTitle">상세정보</div>
  </div>
  <div class="panel-head-actions" id="productDetailActions">
    <button class="inline-button btn-icon-only btn-tone-inquiry" id="inquiryProductBtn" title="대화" type="button"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"/><path d="M8 12h8"/><path d="M12 8v8"/></svg></button>
    <button class="inline-button btn-icon-only btn-tone-share" id="shareProductBtn" title="공유" type="button"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg></button>
    <button class="inline-button btn-icon-only btn-tone-contract" id="contractProductBtn" title="계약" type="button"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="m9 15 2 2 4-4"/></svg></button>
    <button class="inline-button btn-icon-only" id="closeDetailBtn" title="닫기" type="button"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
  </div>
</div>
<div class="panel-body panel-body--detail">
  <div class="detail-card" id="productDetail">
    <div class="empty-block">좌측 목록에서 차량을 선택하세요.</div>
  </div>
</div>
</aside>


</div>
{% endblock %}
{% block workspace_page_js %}
<script type="module" src="{{ url_for('static', filename='js/pages/product-list.js') }}" data-page-script="true"></script>
{% endblock %}
