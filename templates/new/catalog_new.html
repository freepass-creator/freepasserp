<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FREEPASS - 차량 카탈로그</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/shared_new/ui_new_theme.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/detail.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/table.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/product-list.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/catalog.css') }}" data-page-style="true">
</head>
<body class="catalog-body" data-page="카탈로그">

<header class="catalog-header">
  <div class="catalog-header__brand">FREEPASS</div>
  <div class="catalog-header__title">차량 카탈로그</div>
</header>

<main class="catalog-main">
  <div class="catalog-toolbar" id="catalog-toolbar">
    <input class="catalog-search" id="catalog-search" type="search" placeholder="차량번호, 모델명, 제조사 검색...">
    <div class="catalog-filter-chips" id="catalog-filter-chips"></div>
  </div>
  <div class="catalog-grid" id="catalog-grid">
    <div class="catalog-empty">상품을 불러오는 중...</div>
  </div>
  <div class="catalog-share-detail" id="catalog-share-detail" hidden></div>
</main>

<!-- 상세 모달 -->
<div class="catalog-modal-overlay" id="catalog-modal" hidden>
  <div class="catalog-modal">
    <button class="catalog-modal__close" id="catalog-modal-close" type="button" aria-label="닫기"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    <div class="catalog-modal__body" id="catalog-modal-body"></div>
  </div>
</div>

<!-- 하단 고정 CTA -->
<footer class="catalog-cta" id="catalog-cta">
  <a class="catalog-cta__button" id="catalog-cta-link" href="tel:" aria-label="영업자에게 연락하기">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
    <span>영업자에게 연락하기</span>
  </a>
</footer>

<script type="module" src="{{ url_for('static', filename='js/pages/catalog.js') }}"></script>
</body>
</html>
