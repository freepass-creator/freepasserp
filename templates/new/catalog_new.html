<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title id="page-title">{{ og_title or '렌터카 상품 안내' }}</title>
<meta property="og:title" content="{{ og_title or '렌터카 상품 안내' }}">
<meta property="og:description" content="{{ og_desc or '렌터카 장기렌트 상품을 검색하고 비교해보세요.' }}">
<meta property="og:type" content="website">
<meta name="description" content="{{ og_desc or '렌터카 장기렌트 상품을 검색하고 비교해보세요.' }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}?v={{ app_version }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/shared_new/ui_new_theme.css') }}?v={{ app_version }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/catalog.css') }}?v={{ app_version }}">
</head>
<body class="catalog-body" data-page="카탈로그">

<!-- 헤더 -->
<header class="catalog-header" id="catalog-header">
  <div class="catalog-header-left">
    <button class="catalog-header-back" id="catalog-back-btn" type="button" hidden>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <button class="catalog-header-filter" id="catalog-filter-btn" type="button" hidden>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 5h20"/><path d="M6 12h12"/><path d="M9 19h6"/></svg>
      <span class="catalog-header-filter__label">필터</span>
    </button>
  </div>
  <div class="catalog-header-right" id="catalog-agent-card">
    <div class="catalog-header-agent">
      <img class="catalog-header-ci" id="catalog-agent-ci" src="" alt="" hidden>
      <span class="catalog-header-company" id="catalog-agent-company"></span>
      <span class="catalog-header-sep">·</span>
      <span class="catalog-header-name" id="catalog-agent-name"></span>
      <span class="catalog-header-position" id="catalog-agent-position"></span>
    </div>
    <a class="catalog-header-call" id="catalog-header-call" href="tel:" hidden title="전화">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384"/></svg>
    </a>
  </div>
</header>

<!-- ═══ VIEW 1: 상품 상세 (공유링크 또는 카드 클릭) ═══ -->
<main class="catalog-single" id="catalog-single" hidden>
  <div class="catalog-single__gallery" id="single-gallery"></div>
  <div class="catalog-single__body" id="single-body"></div>
  <div class="catalog-single__actions">
    <button class="catalog-share-btn" id="single-share-btn" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      링크 복사
    </button>
    <button class="catalog-browse-btn" id="browse-all-btn" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      전체 상품 보기
    </button>
  </div>
  <div class="catalog-single__cta" id="single-cta" hidden>
    <a class="catalog-cta__button" id="single-cta-link" href="tel:">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <span id="single-cta-text">전화 문의하기</span>
    </a>
  </div>
</main>

<!-- ═══ 풀스크린 사진 뷰어 ═══ -->
<div class="photo-viewer" id="photo-viewer" hidden>
  <button class="photo-viewer__close" id="photo-viewer-close" type="button" aria-label="닫기">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
  </button>
  <div class="photo-viewer__counter" id="photo-viewer-counter"></div>
  <div class="photo-viewer__scroll" id="photo-viewer-scroll"></div>
</div>

<!-- ═══ VIEW 2: 전체 카탈로그 ═══ -->
<main class="catalog-main" id="catalog-main" hidden>
  <!-- 모바일 오버레이 -->
  <div class="catalog-sidebar-overlay" id="catalog-sidebar-overlay" hidden></div>
  <!-- 필터 사이드바 -->
  <aside class="catalog-sidebar" id="catalog-sidebar">
    <div class="catalog-sidebar__head">
      <span class="catalog-sidebar__head-title">필터</span>
      <button class="catalog-sidebar__close" id="catalog-sidebar-close" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div class="catalog-sidebar__summary">
      <div class="catalog-sidebar__count">
        <span class="catalog-sidebar__count-label">상품차량</span>
        <span class="catalog-sidebar__count-value" id="catalog-count-text">0</span><span class="catalog-sidebar__count-unit">대</span>
      </div>
      <button class="catalog-sidebar__reset" id="catalog-filter-reset" type="button">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        선택 초기화
      </button>
    </div>
    <div class="catalog-sidebar__search">
      <svg class="catalog-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input class="catalog-search" id="catalog-search" type="search" placeholder="모델명, 차량번호 검색...">
    </div>
    <div id="catalog-filter-sections"></div>
  </aside>
  <!-- 우측: 상품 그리드 -->
  <div class="catalog-content">
    <div class="catalog-grid" id="catalog-grid">
      <div class="catalog-skeleton-wrap">
        <div class="catalog-skeleton-card"></div>
        <div class="catalog-skeleton-card"></div>
        <div class="catalog-skeleton-card"></div>
        <div class="catalog-skeleton-card"></div>
        <div class="catalog-skeleton-card"></div>
        <div class="catalog-skeleton-card"></div>
      </div>
    </div>
  </div>
</main>

<!-- 하단 고정 CTA (카탈로그 뷰) -->
<footer class="catalog-footer" id="catalog-footer" hidden>
  <a class="catalog-cta__button catalog-cta__button--footer" id="catalog-cta-link" href="tel:" aria-label="영업자에게 연락하기">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    <span id="catalog-cta-text">영업자에게 연락하기</span>
  </a>
</footer>

<script type="module" src="{{ url_for('static', filename='js/pages/catalog.js') }}?v={{ app_version }}"></script>
</body>
</html>
