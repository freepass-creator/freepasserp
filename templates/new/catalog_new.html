<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title id="page-title">렌트카 상품 안내</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/shared_new/ui_new_theme.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/catalog.css') }}">
</head>
<body class="catalog-body" data-page="카탈로그">

<!-- 영업자 명함 헤더 -->
<header class="catalog-header" id="catalog-header">
  <div class="catalog-agent-card" id="catalog-agent-card">
    <div class="catalog-agent-avatar" id="catalog-agent-avatar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="5"/><path d="M3 21a9 9 0 0 1 18 0"/></svg>
    </div>
    <div class="catalog-agent-info">
      <div class="catalog-agent-name" id="catalog-agent-name"></div>
      <div class="catalog-agent-company" id="catalog-agent-company"></div>
    </div>
  </div>
  <div class="catalog-header-right">
    <!-- 카탈로그 뷰일 때만 보이는 뒤로가기 -->
    <button class="catalog-header-back" id="catalog-back-btn" type="button" hidden>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <a class="catalog-header-call" id="catalog-header-call" href="tel:" hidden>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <span id="catalog-header-call-text">전화</span>
    </a>
  </div>
</header>

<!-- ═══ VIEW 1: 공유 상품 단일 상세 ═══ -->
<main class="catalog-single" id="catalog-single" hidden>
  <!-- 사진 갤러리 -->
  <div class="catalog-single__gallery" id="single-gallery"></div>

  <!-- 상품 기본정보 -->
  <div class="catalog-single__info" id="single-info"></div>

  <!-- 가격표 -->
  <div class="catalog-single__pricing" id="single-pricing"></div>

  <!-- 차량 스펙 -->
  <div class="catalog-single__specs" id="single-specs"></div>

  <!-- 전체 상품 보기 버튼 -->
  <div class="catalog-single__browse">
    <button class="catalog-browse-btn" id="browse-all-btn" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      전체 상품 보기
    </button>
  </div>

  <!-- 문의 CTA -->
  <div class="catalog-single__cta" id="single-cta" hidden>
    <a class="catalog-cta__button" id="single-cta-link" href="tel:">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <span id="single-cta-text">전화 문의하기</span>
    </a>
  </div>
</main>

<!-- ═══ VIEW 2: 전체 카탈로그 ═══ -->
<main class="catalog-main" id="catalog-main" hidden>
  <!-- 검색 + 필터 -->
  <div class="catalog-toolbar" id="catalog-toolbar">
    <div class="catalog-search-wrap">
      <svg class="catalog-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input class="catalog-search" id="catalog-search" type="search" placeholder="모델명, 차량번호, 제조사 검색...">
    </div>
    <div class="catalog-filter-chips" id="catalog-filter-chips"></div>
  </div>

  <!-- 상품 그리드 -->
  <div class="catalog-count-bar" id="catalog-count-bar" hidden>
    <span id="catalog-count-text"></span>
  </div>
  <div class="catalog-grid" id="catalog-grid">
    <div class="catalog-skeleton-wrap">
      <div class="catalog-skeleton-card"></div>
      <div class="catalog-skeleton-card"></div>
      <div class="catalog-skeleton-card"></div>
      <div class="catalog-skeleton-card"></div>
      <div class="catalog-skeleton-card"></div>
      <div class="catalog-skeleton-card"></div>
    </div>
  </div>
</main>

<!-- ═══ 상세 모달 (그리드에서 카드 클릭 시) ═══ -->
<div class="catalog-modal-overlay" id="catalog-modal" hidden aria-modal="true" role="dialog">
  <div class="catalog-modal">
    <button class="catalog-modal__close" id="catalog-modal-close" type="button" aria-label="닫기">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
    <div class="catalog-modal__gallery" id="catalog-modal-gallery"></div>
    <div class="catalog-modal__body" id="catalog-modal-body"></div>
    <div class="catalog-modal__footer">
      <a class="catalog-cta__button" id="catalog-modal-cta" href="tel:" aria-label="문의하기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span id="catalog-modal-cta-text">문의하기</span>
      </a>
    </div>
  </div>
</div>

<!-- 하단 고정 CTA (카탈로그 뷰) -->
<footer class="catalog-footer" id="catalog-footer" hidden>
  <a class="catalog-cta__button catalog-cta__button--footer" id="catalog-cta-link" href="tel:" aria-label="영업자에게 연락하기">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    <span id="catalog-cta-text">영업자에게 연락하기</span>
  </a>
</footer>

<script type="module" src="{{ url_for('static', filename='js/pages/catalog.js') }}?v={{ app_version }}"></script>
</body>
</html>
