<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1a33"/>
      <stop offset="100%" stop-color="#1b2a4a"/>
    </linearGradient>
    <style>
      @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
      .b { font-family: 'Pretendard', -apple-system, 'Segoe UI', sans-serif; font-weight: 700; fill: #ffffff; letter-spacing: -0.04em; }
      .t { font-family: 'Pretendard', -apple-system, 'Segoe UI', sans-serif; font-weight: 200; fill: #ffffff; letter-spacing: -0.02em; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- FREEPASS(700) ERP(200) 한 줄, 정중앙 -->
  <text x="600" y="355" font-size="180" text-anchor="middle">
    <tspan class="b">FREEPASS</tspan><tspan class="t"> ERP</tspan>
  </text>
</svg>
