<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1a33"/>
      <stop offset="100%" stop-color="#1b2a4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <style>
      .brand { font-family: 'Pretendard', -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif; fill: #ffffff; font-weight: 800; letter-spacing: -0.04em; }
      .erp   { font-family: 'Pretendard', -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif; fill: #60a5fa; font-weight: 800; letter-spacing: 0.01em; }
      .desc  { font-family: 'Pretendard', -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif; fill: #cbd5e1; font-weight: 500; letter-spacing: -0.01em; }
      .tag   { font-family: 'Pretendard', -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif; fill: #ffffff; font-weight: 700; letter-spacing: 0.04em; }
    </style>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 좌측 액센트 바 -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accent)"/>

  <!-- 우측 상단 데코 도형 -->
  <circle cx="1080" cy="120" r="180" fill="#3b82f6" opacity="0.08"/>
  <circle cx="1140" cy="540" r="120" fill="#60a5fa" opacity="0.08"/>

  <!-- 작은 태그 (좌상단) -->
  <g transform="translate(80, 90)">
    <rect width="100" height="32" rx="4" fill="#3b82f6" opacity="0.18"/>
    <text class="tag" x="50" y="22" font-size="14" text-anchor="middle">B2B ERP</text>
  </g>

  <!-- 메인 로고 — FREEPASS -->
  <text class="brand" x="80" y="290" font-size="140">FREEPASS</text>

  <!-- ERP 서브 -->
  <text class="erp" x="80" y="380" font-size="64">ERP</text>

  <!-- 구분선 -->
  <rect x="80" y="430" width="80" height="3" fill="#60a5fa"/>

  <!-- 슬로건 -->
  <text class="desc" x="80" y="490" font-size="32">장기렌터카 · 구독서비스</text>
  <text class="desc" x="80" y="535" font-size="32">영업전용 ERP</text>

  <!-- 우측 자동차 아이콘 -->
  <g transform="translate(820, 250) scale(8)" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <path d="M21 8 17.65 2.65A2 2 0 0 0 15.94 2H8.06a2 2 0 0 0-1.71 1.65L3 8"/>
    <path d="M7 10h0"/>
    <path d="M17 10h0"/>
    <rect width="18" height="13" x="3" y="8" rx="2"/>
    <path d="M5 21v-2"/>
    <path d="M19 21v-2"/>
  </g>

  <!-- 도메인 (우하단) -->
  <text class="desc" x="1120" y="585" font-size="20" text-anchor="end" fill="#94a3b8">freepasserp.com</text>
</svg>
